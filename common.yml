---
- name: Apply base system configuration
  hosts: all

  tasks:
    - name: Ensure all packages are updated to their latest version
      become: true
      ansible.builtin.apt:
        upgrade: true
        update_cache: true
      when: ansible_os_family == 'Debian'

    - name: Ensure required software available from apt is installed
      become: true
      ansible.builtin.apt:
        pkg:
          - vim
          - vim-gui-common
          - git
          - make
          - gcc # to build dragon
          - pkgconf # to build dragon
          - libgtk-3-dev # to build dragon
          - curl
          - jq
          - xclip
          - fzf
          - ripgrep
          - openjdk-21-jdk
          - stow
          - nnn
          - tmux
          - zsh
          - fonts-firacode
          - img2pdf
          - ocrmypdf
      when: ansible_os_family == 'Debian'

    - name: Ensure Homebrew packages are installed
      community.general.homebrew:
        name:
          - vim
          - git
          - make
          - gcc
          - curl
          - jq
          - fzf
          - ripgrep
          - openjdk@21
          - stow
          - nnn
          - tmux
          - zsh
          - img2pdf
          - ocrmypdf
          - jump
        state: present
      when: ansible_os_family == 'Darwin'

    - name: Ensure Homebrew Cask apps are installed
      community.general.homebrew_cask:
        name:
          - font-fira-code
          - obsidian
          - insomnia
          - rectangle
        state: present
      when: ansible_os_family == 'Darwin'

    - name: Ensure jump is installed from snap
      become: true
      community.general.snap:
        name: jump
      when: ansible_os_family == 'Debian'

    - name: Ensure user has zsh set as his shell
      become: true
      ansible.builtin.user:
        name: "{{ ansible_facts['user_id'] }}"
        shell: /bin/zsh
      when: ansible_os_family == 'Debian'

    - name: Ensure oh-my-zsh has been installed
      ansible.builtin.git:
        repo: https://github.com/ohmyzsh/ohmyzsh.git
        dest: "{{ ansible_env.HOME }}/.oh-my-zsh"
        depth: 1
        version: master

    - name: Ensure zsh-syntax-highlighting plugin is installed
      ansible.builtin.git:
        repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
        dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"
        depth: 1
        version: master

    - name: Ensure fzf-tab plugin is installed
      ansible.builtin.git:
        repo: https://github.com/Aloxaf/fzf-tab.git
        dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/fzf-tab"
        depth: 1
        version: master

    - name: Ensure spaceship theme is cloned
      ansible.builtin.git:
        repo: https://github.com/spaceship-prompt/spaceship-prompt.git
        dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/themes/spaceship-prompt"
        depth: 1
        version: master

    - name: Ensure spaceship theme is symlinked
      ansible.builtin.file:
        src: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/themes/spaceship-prompt/spaceship.zsh-theme"
        dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/themes/spaceship.zsh-theme"
        state: link
      when: not ansible_check_mode

    - name: Ensure dotfiles are applied
      block:
        - name: Dotfiles | Clone
          ansible.builtin.git:
            repo: https://github.com/melo0187/dotfiles.git
            dest: "{{ ansible_env.HOME }}/dotfiles"
            version: master

        - name: Dotfiles | Stow
          ansible.builtin.command: stow .
          args:
            chdir: "{{ ansible_env.HOME }}/dotfiles"
          changed_when: true
          when: not ansible_check_mode

    - name: Ensure docker is installed (Linux)
      ansible.builtin.include_tasks: tasks/docker-linux.yml
      when: ansible_os_family == 'Debian' and not ansible_check_mode

    - name: Ensure docker is installed (macOS)
      ansible.builtin.include_tasks: tasks/docker-macos.yml
      when: ansible_os_family == 'Darwin' and not ansible_check_mode

    - name: Ensure dragon is installed (used with nnn)
      when: ansible_os_family == 'Debian'
      block:
        - name: Dragon | Clone repository
          ansible.builtin.git:
            repo: https://github.com/mwh/dragon.git
            dest: /tmp/dragon
            depth: 1
            version: master

        - name: Dragon | Make install
          ansible.builtin.command:
            cmd: make install
            chdir: /tmp/dragon/
            creates: "{{ ansible_env.HOME }}/.local/bin/dragon"
          when: not ansible_check_mode

    - name: Ensure nnn plugins are installed
      block:
        - name: Nnn plugins | Check if already installed
          ansible.builtin.stat:
            path: "{{ ansible_env.HOME }}/.config/nnn/plugins"
          register: nnn_plugins

        - name: Nnn plugins | Download install script
          ansible.builtin.get_url:
            url: https://raw.githubusercontent.com/jarun/nnn/master/plugins/getplugs
            dest: /tmp/nnn-getplugs.sh
            mode: "0755"
          when: not nnn_plugins.stat.exists

        - name: Nnn plugins | Run install script
          ansible.builtin.command:
            cmd: /bin/sh /tmp/nnn-getplugs.sh
          when: not nnn_plugins.stat.exists
          changed_when: true

    - name: Ensure Synology Drive is installed (Linux)
      ansible.builtin.include_tasks: tasks/synology-drive-linux.yml
      when: ansible_os_family == 'Debian'

    - name: Ensure Synology Drive is installed (macOS)
      ansible.builtin.include_tasks: tasks/synology-drive-macos.yml
      when: ansible_os_family == 'Darwin'

    - name: Ensure Obsidian is installed from snap
      become: true
      community.general.snap:
        name: obsidian
        classic: true
      when: ansible_os_family == 'Debian'

    - name: Ensure Signal is installed (Linux)
      ansible.builtin.include_tasks: tasks/signal-linux.yml
      when: ansible_os_family == 'Debian' and not ansible_check_mode

    - name: Ensure Signal is installed (macOS)
      ansible.builtin.include_tasks: tasks/signal-macos.yml
      when: ansible_os_family == 'Darwin' and not ansible_check_mode

    - name: Ensure Insomnia is installed from snap
      become: true
      community.general.snap:
        name: insomnia
      when: ansible_os_family == 'Debian'
