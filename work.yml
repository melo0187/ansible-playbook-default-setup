---
- name: Configure work device
  hosts: all

  tasks:
    - name: Ensure Slack is installed from snap
      become: true
      community.general.snap:
        name: slack
        classic: true

    - name: Ensure IntelliJ IDEA Ultimate is installed from snap
      become: true
      community.general.snap:
        name: intellij-idea-ultimate
        classic: true

    - name: Ensure kubectl is installed from snap
      become: true
      community.general.snap:
        name: kubectl
        classic: true

    - name: Ensure Terraform is installed
      when: not ansible_check_mode
      become: true
      block:
        - name: Terraform | Download GPG key
          ansible.builtin.get_url:
            url: https://apt.releases.hashicorp.com/gpg
            dest: /etc/apt/keyrings/hashicorp.asc
            mode: "0644"

        - name: Terraform | Add apt source
          ansible.builtin.apt_repository:
            repo: >-
              deb [arch=amd64 signed-by=/etc/apt/keyrings/hashicorp.asc]
              https://apt.releases.hashicorp.com
              {{ ansible_facts['distribution_release'] }} main
            state: present

        - name: Terraform | Install package
          ansible.builtin.apt:
            pkg:
              - terraform

    - name: Install Granted from Common Fate APT repository
      when: not ansible_check_mode
      become: true
      block:
        - name: Ensure GPG is installed
          ansible.builtin.apt:
            name: gpg
            state: present
            update_cache: true

        - name: Download and install the Common Fate GPG key
          ansible.builtin.get_url:
            url: https://apt.releases.commonfate.io/gpg
            dest: /usr/share/keyrings/common-fate-linux.gpg
            mode: "0644"
          register: gpg_key

        - name: Add the Common Fate APT repository
          ansible.builtin.copy:
            dest: /etc/apt/sources.list.d/common-fate.list
            content: "deb [arch={{ ansible_architecture }} signed-by=/usr/share/keyrings/common-fate-linux.gpg] https://apt.releases.commonfate.io stable main"
            mode: "0644"
          register: apt_repo

        - name: Update APT repositories
          ansible.builtin.apt:
            update_cache: true
          when: gpg_key.changed or apt_repo.changed

        - name: Install Granted
          ansible.builtin.apt:
            name: granted
            state: present

        - name: Ensure alias assume="source assume" is in ~/.zshrc-work
          ansible.builtin.lineinfile:
            path: ~/.zshrc-work
            line: 'alias assume="source assume"'
            create: true
            mode: "0644"

    - name: Install pnpm
      block:
        - name: Check if pnpm is already installed
          ansible.builtin.command:
            cmd: which pnpm
          register: pnpm_check
          changed_when: false
          failed_when: false

        - name: Download pnpm install script
          ansible.builtin.get_url:
            url: https://get.pnpm.io/install.sh
            dest: /tmp/pnpm-install.sh
            mode: "0755"
          when: pnpm_check.rc != 0

        - name: Install pnpm
          ansible.builtin.command:
            cmd: /bin/bash /tmp/pnpm-install.sh
          when: pnpm_check.rc != 0
          changed_when: true

    - name: Install nvm
      block:
        - name: NVM | Check if already installed
          ansible.builtin.stat:
            path: "{{ ansible_env.HOME }}/.nvm"
          register: nvm_dir

        - name: NVM | Download install script
          ansible.builtin.get_url:
            url: https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh
            dest: /tmp/nvm-install.sh
            mode: "0755"
          when: not nvm_dir.stat.exists

        - name: NVM | Run install script
          ansible.builtin.command:
            cmd: /bin/bash /tmp/nvm-install.sh
          when: not nvm_dir.stat.exists
          changed_when: true

    - name: Install SDKMAN
      block:
        - name: SDKMAN | Check if already installed
          ansible.builtin.stat:
            path: "{{ ansible_env.HOME }}/.sdkman"
          register: sdkman_dir

        - name: SDKMAN | Download install script
          ansible.builtin.get_url:
            url: https://get.sdkman.io
            dest: /tmp/sdkman-install.sh
            mode: "0755"
          when: not sdkman_dir.stat.exists

        - name: SDKMAN | Run install script
          ansible.builtin.command:
            cmd: /bin/bash /tmp/sdkman-install.sh
          when: not sdkman_dir.stat.exists
          changed_when: true
