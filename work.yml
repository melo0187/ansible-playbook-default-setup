---
- name: Configure work device
  hosts: all

  tasks:
    - name: Ensure Slack is installed from snap
      become: true
      community.general.snap:
        name: slack
        classic: true
      when: ansible_os_family == 'Debian'

    - name: Ensure IntelliJ IDEA Ultimate is installed from snap
      become: true
      community.general.snap:
        name: intellij-idea-ultimate
        classic: true
      when: ansible_os_family == 'Debian'

    - name: Ensure kubectl is installed from snap
      become: true
      community.general.snap:
        name: kubectl
        classic: true
      when: ansible_os_family == 'Debian'

    - name: Ensure work tools are installed via Homebrew
      community.general.homebrew:
        name:
          - kubectl
        state: present
      when: ansible_os_family == 'Darwin'

    - name: Ensure work apps are installed via Homebrew Cask
      community.general.homebrew_cask:
        name:
          - slack
          - intellij-idea
        state: present
      when: ansible_os_family == 'Darwin'

    - name: Ensure Terraform is installed (Linux)
      ansible.builtin.include_tasks: tasks/terraform-linux.yml
      when: ansible_os_family == 'Debian' and not ansible_check_mode

    - name: Ensure Terraform is installed (macOS)
      ansible.builtin.include_tasks: tasks/terraform-macos.yml
      when: ansible_os_family == 'Darwin' and not ansible_check_mode

    - name: Ensure Granted is installed (Linux)
      ansible.builtin.include_tasks: tasks/granted-linux.yml
      when: ansible_os_family == 'Debian' and not ansible_check_mode

    - name: Ensure Granted is installed (macOS)
      ansible.builtin.include_tasks: tasks/granted-macos.yml
      when: ansible_os_family == 'Darwin' and not ansible_check_mode

    - name: Ensure alias assume="source assume" is in ~/.zshrc-work
      ansible.builtin.lineinfile:
        path: ~/.zshrc-work
        line: 'alias assume="source assume"'
        create: true
        mode: "0644"

    - name: Install pnpm
      block:
        - name: Check if pnpm is already installed
          ansible.builtin.command:
            cmd: which pnpm
          register: pnpm_check
          changed_when: false
          failed_when: false

        - name: Download pnpm install script
          ansible.builtin.get_url:
            url: https://get.pnpm.io/install.sh
            dest: /tmp/pnpm-install.sh
            mode: "0755"
          when: pnpm_check.rc != 0

        - name: Install pnpm
          ansible.builtin.command:
            cmd: /bin/bash /tmp/pnpm-install.sh
          when: pnpm_check.rc != 0
          changed_when: true

    - name: Install nvm
      block:
        - name: NVM | Check if already installed
          ansible.builtin.stat:
            path: "{{ ansible_env.HOME }}/.nvm"
          register: nvm_dir

        - name: NVM | Download install script
          ansible.builtin.get_url:
            url: https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh
            dest: /tmp/nvm-install.sh
            mode: "0755"
          when: not nvm_dir.stat.exists

        - name: NVM | Run install script
          ansible.builtin.command:
            cmd: /bin/bash /tmp/nvm-install.sh
          when: not nvm_dir.stat.exists
          changed_when: true

    - name: Install SDKMAN
      block:
        - name: SDKMAN | Check if already installed
          ansible.builtin.stat:
            path: "{{ ansible_env.HOME }}/.sdkman"
          register: sdkman_dir

        - name: SDKMAN | Download install script
          ansible.builtin.get_url:
            url: https://get.sdkman.io
            dest: /tmp/sdkman-install.sh
            mode: "0755"
          when: not sdkman_dir.stat.exists

        - name: SDKMAN | Run install script
          ansible.builtin.command:
            cmd: /bin/bash /tmp/sdkman-install.sh
          when: not sdkman_dir.stat.exists
          changed_when: true
