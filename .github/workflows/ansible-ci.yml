---
name: Ansible CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pipx
        run: sudo apt-get install -y pipx

      - name: Install ansible-lint
        run: pipx install ansible-lint

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run ansible-lint
        run: ansible-lint playbook.yml

  dry-run:
    name: Dry run - ${{ matrix.device_type }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            device_type: private
          - os: ubuntu-latest
            device_type: work
          - os: macos-latest
            device_type: work
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Ansible (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-add-repository -y ppa:ansible/ansible
          sudo apt-get update
          sudo apt-get install -y ansible

      - name: Install Ansible (macOS)
        if: runner.os == 'macOS'
        run: brew install ansible

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Dry run playbook
        run: >
          ansible-playbook
          --connection=local
          --inventory 127.0.0.1,
          --check
          playbook.yml
          --extra-vars "device_type=${{ matrix.device_type }}"

  dry-run-complete:
    name: Dry run complete
    runs-on: ubuntu-latest
    needs: dry-run
    if: always()
    steps:
      - name: Check matrix result
        if: needs.dry-run.result != 'success'
        run: exit 1
