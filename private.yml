---
- name: Configure private device
  hosts: all

  tasks:
    - name: Ensure software for private use available from apt is installed
      become: true
      ansible.builtin.apt:
        pkg:
          - hexchat

    - name: Install Steam for Valve's official deb
      block:
        - name: Steam | Enable i386 architecture
          ansible.builtin.command:
            cmd: dpkg --add-architecture i386
          become: true
          changed_when: false

        - name: Steam | Download deb
          ansible.builtin.get_url:
            url: https://cdn.akamai.steamstatic.com/client/installer/steam.deb
            dest: /tmp/steam.deb
            mode: '0644'
          when: not ansible_check_mode

        - name: Steam | Install deb
          ansible.builtin.apt:
            deb: /tmp/steam.deb
            update_cache: true
          become: true
          when: not ansible_check_mode

    - name: Install OpenRazer and Polychromatic from PPAs
      when: not ansible_check_mode
      become: true
      block:
        - name: Add OpenRazer PPA
          ansible.builtin.apt_repository:
            repo: ppa:openrazer/stable
            state: present

        - name: Add Polychromatic PPA
          ansible.builtin.apt_repository:
            repo: ppa:polychromatic/stable
            state: present

        - name: Update APT package index
          ansible.builtin.apt:
            update_cache: true

        - name: Install Polychromatic
          ansible.builtin.apt:
            pkg:
              - polychromatic
              - openrazer-meta

        - name: Add user to the plugdev group
          ansible.builtin.user:
            name: "{{ ansible_facts['user_id'] }}"
            groups: plugdev
            append: true

    - name: Ensure software for private use available from snap is installed
      become: true
      community.general.snap:
        name:
          - discord

    - name: Ensure IntelliJ IDEA Community is installed from snap
      become: true
      community.general.snap:
        name: intellij-idea-community
        classic: true

    - name: Setup Flatpak and Flathub on Ubuntu
      when: not ansible_check_mode
      become: true
      block:
        - name: Install Flatpak
          ansible.builtin.apt:
            name: flatpak
            state: present
            update_cache: true

        - name: Add Flathub remote repository
          community.general.flatpak_remote:
            name: flathub
            state: present
            flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo
            method: system

    - name: Ensure ProtonPlus is installed from Flathub
      when: not ansible_check_mode
      community.general.flatpak:
        name: com.vysp3r.ProtonPlus
        state: present
        remote: flathub

    - name: Ensure Linux Game Bench is installed
      block:
        - name: Linux Game Bench | Install dependencies
          ansible.builtin.apt:
            pkg:
              - mangohud
              - vulkan-tools
            state: present
            update_cache: true
          become: true

        - name: Linux Game Bench | Install via pipx
          community.general.pipx:
            name: linuxgamebench
            source: git+https://github.com/taaderbe/linuxgamebench.git
            state: present

    - name: Mount DiskStation shares with autofs
      when: not ansible_check_mode
      become: true
      block:
        - name: Ensure nfs-common and autofs are installed
          ansible.builtin.apt:
            name:
              - nfs-common
              - autofs
            state: present

        - name: Ensure auto.master contains the autofs configuration
          ansible.builtin.lineinfile:
            path: /etc/auto.master
            line: "/- /etc/auto.home"
            state: present

        - name: Create necessary mount point directories
          ansible.builtin.file:
            path: "{{ item }}"
            state: directory
            owner: "{{ ansible_facts['user_id'] }}"
            group: "{{ ansible_facts['user_id'] }}"
            mode: "0755"
          loop:
            - "{{ ansible_env.HOME }}/Music/AudioStation"
            - "{{ ansible_env.HOME }}/Videos/VideoStation"
            - "{{ ansible_env.HOME }}/Pictures/PhotoStation"
            - "{{ ansible_env.HOME }}/Downloads/DownloadStation"
            - "{{ ansible_env.HOME }}/Backup"

        - name: Deploy the auto.home file with dynamic username
          ansible.builtin.template:
            src: auto.home.j2
            dest: /etc/auto.home
            owner: root
            group: root
            mode: "0644"

        - name: Reload autofs service
          ansible.builtin.service:
            name: autofs
            state: reloaded
